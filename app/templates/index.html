<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Provincias del Ecuador</title>

    <link rel="stylesheet"
          href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header>

    <h1>Provincias del Ecuador</h1>

    <h3>{{ server_name }}</h3>

</header>

<div class="container">

    <div id="map"></div>

    <div class="info">

        <h2>Información</h2>

        <p>Seleccione un marcador del mapa.</p>

        <div id="datos"></div>

    </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([-1.83,-78.18],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{

    attribution:'© OpenStreetMap'

}).addTo(map);

fetch('/api/provincias')

.then(response=>response.json())

.then(data=>{

    data.provincias.forEach(provincia=>{

        const marker=L.marker([
            provincia.latitud,
            provincia.longitud
        ]).addTo(map);

        marker.on('click',()=>{

            document.getElementById('datos').innerHTML=`

                <h3>${provincia.nombre}</h3>

                <p><strong>Capital:</strong> ${provincia.capital}</p>

                <p><strong>Área:</strong> ${provincia.area_km2} km²</p>

                <p><strong>Población:</strong> ${provincia.poblacion_estimada}</p>

                <hr>

                <p><strong>Servidor:</strong> ${data.servidor}</p>

            `;

        });

    });

});

</script>

</body>

</html>
